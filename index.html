<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HE&ART — Quote System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F5F3EF; --surface: #FFFFFF; --surface2: #F0EDE8; --border: #E2DDD6;
  --text: #1A1916; --text2: #6B6760; --accent: #1E3A2F; --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 220px; background: var(--accent); color: white; padding: 20px;
  position: fixed; top: 0; left: 0; bottom: 0; transition: transform 0.3s ease; z-index: 100;
}
.sidebar.closed { transform: translateX(-220px); }
.sidebar h2 { font-family: 'DM Serif Display', serif; margin-bottom: 20px; font-size: 24px; }
.nav-item { 
  display: block; width: 100%; padding: 12px; color: rgba(255,255,255,0.7); 
  text-align: left; background: none; border: none; cursor: pointer; border-radius: 5px;
}
.nav-item:hover { background: rgba(255,255,255,0.1); color: white; }

/* MAIN CONTENT */
.main { flex: 1; margin-left: 220px; transition: margin-left 0.3s ease; }
.main.expanded { margin-left: 0; }
.topbar { 
  background: white; padding: 15px 30px; border-bottom: 1px solid var(--border); 
  display: flex; align-items: center; position: sticky; top: 0; 
}
.toggle-btn { padding: 5px 10px; cursor: pointer; margin-right: 15px; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
.content { padding: 30px; }
.card { background: white; padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <h2>HE&ART</h2>
  <nav>
    <button class="nav-item" onclick="goPage('dashboard')">📊 Dashboard</button>
    <button class="nav-item" onclick="goPage('new-quote')">✏️ New Quote</button>
    <button class="nav-item" onclick="goPage('quotes')">📋 All Quotes</button>
    <button class="nav-item" onclick="goPage('settings')">⚙️ Settings</button>
  </nav>
</aside>

<div class="main" id="main">
  <div class="topbar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰ 메뉴 접기/펴기</button>
    <h3 id="page-title">Dashboard</h3>
  </div>
  <div class="content">
    <div id="dashboard" class="page active">
      <div class="card">
        <h1>Welcome to HE&ART</h1>
        <p style="margin-top:10px; color:var(--text2);">왼쪽 메뉴를 통해 견적을 관리하세요. 상단 버튼을 누르면 사이드바가 숨겨집니다.</p>
      </div>
    </div>
    <div id="new-quote" class="page">
      <div class="card"><h2>New Quote</h2><p>견적 작성 페이지입니다.</p></div>
    </div>
    <div id="quotes" class="page">
      <div class="card"><h2>All Quotes</h2><p>견적 목록 페이지입니다.</p></div>
    </div>
    <div id="settings" class="page">
      <div class="card"><h2>Settings</h2><p>설정 페이지입니다.</p></div>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('closed');
  document.getElementById('main').classList.toggle('expanded');
}
function goPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.getElementById('page-title').textContent = pageId.charAt(0).toUpperCase() + pageId.slice(1);
}
</script>
</body>
</html>
